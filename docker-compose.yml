version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: oncall_postgres
    environment:
      POSTGRES_DB: oncall
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oncall_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: oncall_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    command: start-dev
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: .
      target: workers-runner
    container_name: oncall_migrate
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/oncall?schema=public"
    command: sh -c "npx prisma migrate resolve --applied 0_init 2>/dev/null; npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: oncall_app
    env_file: .env
    environment:
      # Override localhost URLs with Docker service hostnames
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/oncall?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  workers:
    build:
      context: .
      target: workers-runner
    container_name: oncall_workers
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/oncall?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
